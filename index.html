<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧儀表板 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Roboto:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0" rel="stylesheet" />
    <style>
        :root {
            --glass-bg: rgba(20, 20, 20, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --theme-blue: #00d2ff;
            --accent-green: #2ed573;
            --accent-red: #ff4757;
        }
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: cover; background-position: center;
            color: #ffffff; font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden; box-sizing: border-box; padding: 2vh 2vw;
        }
        
        .material-symbols-rounded { vertical-align: middle; font-size: inherit; }

        .dashboard {
            display: grid; grid-template-columns: 1fr 1.3fr; 
            /* 調整這裡的比例：上面天氣縮小(0.75fr)，下面新聞放大(1.25fr) */
            grid-template-rows: 0.75fr 1.25fr; 
            gap: 20px; width: 100%; height: 100%;
        }
        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border);
            border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; padding: 25px; overflow: hidden;
        }
        
        /* 左側面版 */
        .panel-left { grid-column: 1 / 2; grid-row: 1 / 3; position: relative; }
        .clock-wrapper { margin-top: 4vh; text-align: center; } 
        #clock { font-family: 'Roboto'; font-weight: 100; font-size: 15vw; line-height: 0.9; margin-bottom: 5px; letter-spacing: -5px; }
        #date-display { font-size: 2.5vw; font-weight: 300; color: #bbb; letter-spacing: 5px; text-transform: uppercase; }

        /* 狀態列 */
        .status-sidebar {
            position: absolute; left: 25px; top: 52%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 18px;
            font-size: 1.3vw; font-weight: 300; color: rgba(255,255,255,0.8);
            text-align: left;
        }
        .status-item { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        .active .status-dot { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }

        .controls { 
            position: absolute; bottom: 25px; left: 25px; right: 25px;
            display: flex; gap: 10px; justify-content: flex-start; align-items: center;
        }
        button, .upload-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 1.1vw; 
            cursor: pointer; transition: 0.3s; 
            display: flex; align-items: center; gap: 5px;
        }
        button:hover, .upload-btn:hover { background: rgba(255,255,255,0.2); }

        /* 右上天氣區 (高度壓縮優化) */
        .panel-right-top { grid-column: 2 / 3; grid-row: 1 / 2; padding: 20px 25px; }
        .weather-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #current-temp { font-size: 5vw; font-family: 'Roboto'; font-weight: 300; line-height: 1; }
        #current-icon { font-size: 4.5vw; color: var(--theme-blue); }
        
        .weather-info-box { 
            display: grid; grid-template-columns: auto auto; gap: 8px 25px; 
            font-size: 1.1vw; color: #ccc; 
        }
        .weather-info-box .info-line { display: flex; align-items: center; gap: 6px; }

        .forecast-container { display: flex; justify-content: space-between; gap: 8px; flex: 1; }
        .forecast-card { 
            flex: 1; background: rgba(255,255,255,0.05); border-radius: 15px; 
            padding: 8px 5px; display: flex; flex-direction: column; align-items: center; justify-content: space-around;
        }
        .forecast-card .day { font-size: 1vw; color: #888; }
        .forecast-card .icon { font-size: 2.2vw; margin: 2px 0; color: #ddd; }
        .forecast-card .temp { font-family: 'Roboto'; font-size: 1.2vw; font-weight: 500; }

        /* 右下新聞區 (高度增加優化) */
        .panel-right-bottom { grid-column: 2 / 3; grid-row: 2 / 3; display: flex; flex-direction: column;}
        .news-header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0; }
        .news-title { font-size: 1.4vw; color: var(--theme-blue); font-weight: 600; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
        
        .news-tabs { display: flex; gap: 10px; }
        .news-tab { 
            background: rgba(255,255,255,0.1); border: 1px solid transparent; 
            color: #ccc; padding: 6px 16px; border-radius: 20px; 
            font-size: 1vw; cursor: pointer; transition: 0.3s;
        }
        .news-tab:hover { background: rgba(255,255,255,0.2); }
        .news-tab.active { background: var(--theme-blue); color: #000; font-weight: 500; }

        .news-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; flex: 1; min-height: 0; }
        .news-card { 
            display: flex; flex-direction: column; justify-content: flex-start; background: rgba(0,0,0,0.2); 
            border-radius: 15px; padding: 18px; text-decoration: none; color: white; transition: 0.3s;
            border: 1px solid transparent; overflow: hidden;
        }
        .news-card:hover { background: rgba(255,255,255,0.08); border-color: var(--theme-blue); }
        /* 放大的新聞高度，讓文字顯示增加到 4 行 */
        .news-card-text { font-size: 1.25vw; line-height: 1.6; font-weight: 300; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
        .news-source { font-size: 0.9vw; color: #888; margin-top: auto; padding-top: 10px; display: flex; align-items: center; gap: 5px; }

        /* 覆蓋層 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(30px); text-align: center; }
        .eq-active { animation: pulseBgRed 1s infinite !important; }
        @keyframes pulseBgRed { 0% { background: rgba(255,0,0,0.7); } 50% { background: rgba(80,0,0,0.8); } 100% { background: rgba(255,0,0,0.7); } }
        
        .overlay h1 { font-size: 8vw; margin: 0 0 20px; display: flex; align-items: center; gap: 20px; justify-content: center; }
        .overlay p { font-size: 3vw; margin-bottom: 40px; }
        .overlay button { font-size: 2vw; padding: 15px 40px; background: white; color: black; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="glass-panel panel-left">
            <div class="clock-wrapper">
                <div id="clock">00:00</div>
                <div id="date-display">...</div>
            </div>

            <div class="status-sidebar">
                <div class="status-item" id="wakeStat">
                    <div class="status-dot"></div>
                    <span id="wakeStatus">螢幕恆亮：未啟用</span>
                </div>
                <div class="status-item active" id="eqStat">
                    <div class="status-dot"></div>
                    <span id="eqStatus">地震防護：監控中</span>
                </div>
                <div class="status-item">
                    <span class="material-symbols-rounded" style="color:var(--theme-blue); font-size:1.8vw; margin-left: -2px;">location_on</span> 
                    <span id="location">定位中...</span>
                </div>
            </div>

            <div class="controls">
                <button id="wakeBtn"><span class="material-symbols-rounded">brightness_high</span> 啟用恆亮</button>
                <label class="upload-btn"><span class="material-symbols-rounded">wallpaper</span> 換背景<input type="file" id="bgInput" accept="image/*" style="display: none;"></label>
            </div>
        </div>

        <div class="glass-panel panel-right-top">
            <div class="weather-main">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <span class="material-symbols-rounded" id="current-icon">clear_day</span>
                    <div id="current-temp">--°</div>
                </div>
                <div class="weather-info-box">
                    <div class="info-line"><span class="material-symbols-rounded" style="font-size: 1.4vw;">device_thermostat</span> 體感 <span id="current-feels-like">--</span>°</div>
                    <div class="info-line"><span class="material-symbols-rounded" style="font-size: 1.4vw;">air</span> 風速 <span id="current-wind">--</span> km/h</div>
                    <div class="info-line"><span class="material-symbols-rounded" style="font-size: 1.4vw;">umbrella</span> 降雨 <span id="current-rain">--</span>%</div>
                    <div class="info-line"><span class="material-symbols-rounded" style="font-size: 1.4vw;">water_drop</span> 濕度 <span id="current-humidity">--</span>%</div>
                </div>
            </div>
            <div class="forecast-container" id="forecast-grid"></div>
        </div>

        <div class="glass-panel panel-right-bottom">
            <div class="news-header-area">
                <div class="news-title"><span class="material-symbols-rounded">newspaper</span> 即時焦點</div>
                <div class="news-tabs">
                    <button class="news-tab active" data-category="international">國際新聞</button>
                    <button class="news-tab" data-category="japan">日本新聞</button>
                    <button class="news-tab" data-category="taiwan">台灣新聞</button>
                </div>
            </div>
            <div class="news-grid" id="news-grid"></div>
        </div>
    </div>

    <div id="eq-overlay" class="overlay">
        <h1><span class="material-symbols-rounded" style="font-size: 8vw;">warning</span> 氣象署地震速報</h1>
        <p id="eq-info-text"></p>
        <button id="dismissEqBtn">解除警報</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
